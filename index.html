<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZType Space Shooter Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- Canvas for Game World Rendering -->
        <canvas id="gameCanvas" width="600" height="800"></canvas>

        <!-- Centered UI Difficulty Menu Overlay -->
        <div id="menu-overlay">
            <h2 class="menu-title">Select Difficulty to Start</h2>
            <button class="menu-btn" id="easy-btn">EASY</button>
            <button class="menu-btn" id="medium-btn">MEDIUM</button>
            <button class="menu-btn" id="hard-btn">HARD</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
